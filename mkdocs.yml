site_name: BaseRT
site_description: A fast LLM inference runtime for Apple Silicon (Metal).
site_url: https://prabod.github.io/baseRT/
repo_url: https://github.com/prabod/baseRT
repo_name: prabod/baseRT
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

nav:
  - Home: index.md
  - Getting started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - Guides:
      - Managing models: guides/models.md
      - Converting models: guides/converting.md
      - Serving an API: guides/serving.md
      - Chat & completion: guides/chat-complete.md
      - Benchmarking: guides/benchmarking.md
      - Signing & verification: guides/signing.md
  - CLI:
      - Overview: cli/overview.md
      - Command reference: cli/reference.md
  - Bindings:
      - Overview: bindings/index.md
      - Python: bindings/python.md
      - Node: bindings/node.md
      - Rust: bindings/rust.md
      - Swift: bindings/swift.md
  - Reference:
      - Server API: reference/server-api.md
      - .base format: reference/base-format.md
      - Quantization: reference/quantization.md
      - Quant profiles: reference/profiles.md
      - Engine releases: reference/engine-releases.md
      - Security: reference/security.md
